name: NPM publish

on:
  push:
    tags:
      - v*

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm test

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - name: Test OIDC token
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken()
            console.log(`OIDC token received, length: ${token.length}`)
      - run: npm publish
