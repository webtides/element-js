name: NPM publish Test

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, Tag oder SHA, das getestet werden soll"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node -v && npm -v
      - run: npm ci
      - run: npm test

  publish-dry-run:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node -v && npm -v
      - run: npm ci
      - run: npm publish --dry-run

